name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  check:
    name: Typecheck, test, and build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['20', '22']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify binaries exist
        run: |
          test -f dist/cli/main.js
          node dist/cli/main.js --help >/dev/null

